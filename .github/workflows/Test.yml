name: deploy-workflow
on: push
jobs:
  my-push-job:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the code"
        uses: actions/checkout@v6
      - name: "Install Dependencies"
        run: npm ci
  my-lint-job:
    runs-on: ubuntu-latest
    steps:
      - name: "Run the lindt"
        run: npm run lint
  my-test-job:
    runs-on: ubuntu-latest
    steps:
      - name: "Run the test"
        run: npm test
  my-build-job:
    runs-on: ubuntu-latest
    steps:
      - name: "Build the code"
        run: npm run build
