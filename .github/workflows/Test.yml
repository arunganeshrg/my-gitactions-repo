name: deploy-workflow
on: push
jobs:
    my-push-job:
        runs-on: ubuntu-latest
        steps:
            - name: "Checkout the code"
              uses: actions/checkout@v6
            - name: "Install Dependencies"
              run: npm ci
            - name: "Run the lindt"
              run: npm run lint
            - name: "Run the test"
              run: npm test
            - name: "Build the code"
              run: npm run build
